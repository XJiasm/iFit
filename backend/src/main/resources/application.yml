server:
  port: 8080

spring:
  application:
    name: fitmirror-backend

  datasource:
    url: jdbc:mysql://localhost:3306/fitmirror?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# JWT 配置
jwt:
  secret: FitMirrorSecretKey2026ForJWTokenGenerationAndValidation
  expiration: 604800000  # 7天（毫秒）

# AI 配置
ai:
  provider: deepseek  # deepseek / openai / anthropic / qwen
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:your-api-key}
    base-url: https://api.deepseek.com/v1
  openai:
    api-key: ${OPENAI_API_KEY:your-api-key}
    base-url: https://api.openai.com/v1
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:your-api-key}
    base-url: https://api.anthropic.com
  qwen:
    api-key: ${QWEN_API_KEY:your-api-key}
    base-url: https://dashscope.aliyuncs.com/api/v1

# 日志
logging:
  level:
    com.fitmirror: DEBUG
    org.springframework.security: INFO

# 文件上传
file:
  upload-dir: uploads

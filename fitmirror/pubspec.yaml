name: fitmirror
description: 虚拟试穿 + AI 穿搭助手

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

  # 图像处理
  image_picker: ^1.0.4
  image_cropper: ^5.0.0
  image: ^4.1.3

  # 网络
  dio: ^5.4.0

  # UI 组件
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.0
  photo_view: ^0.14.0
  badges: ^3.1.2

  # 工具
  uuid: ^4.2.1
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
